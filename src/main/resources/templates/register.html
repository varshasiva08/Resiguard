<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ResiGuard — Register</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg:#0d1117; --surface:#161b22; --surface2:#1c2330;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.11);
    --text:#e6edf3; --text2:#8b949e; --text3:#484f58;
    --accent:#58a6ff; --green:#3fb950; --red:#f85149;
    --green-dim:rgba(63,185,80,0.12); --red-dim:rgba(248,81,73,0.12);
    --accent-dim:rgba(88,166,255,0.1); --radius:10px;
  }
  html, body { min-height: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
    display: flex; align-items: flex-start; justify-content: center; min-height: 100vh; padding: 32px 20px; }
  .card { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px;
    padding: 36px 32px; width: 100%; max-width: 520px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #1f6feb, #388bfd);
    border-radius: 12px; display: inline-flex; align-items: center; justify-content: center;
    font-size: 22px; margin-bottom: 10px; }
  .logo h1 { color: var(--text); font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
  .logo p { color: var(--text2); font-size: 13px; margin-top: 3px; }
  .section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--text3); margin: 20px 0 12px; padding-top: 16px; border-top: 1px solid var(--border); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { margin-bottom: 12px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
  .form-group input, .form-group select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 10px 13px; color: var(--text); font-size: 13px;
    font-family: inherit; outline: none; transition: border-color 0.15s; }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); background: rgba(88,166,255,0.04); }
  .form-group input::placeholder { color: var(--text3); }
  .form-group select option { background: var(--surface2); color: var(--text); }
  .extra-fields { display: none; }
  .extra-fields.visible { display: block; }
  .btn { width: 100%; padding: 12px; background: #1f6feb; border: none; border-radius: var(--radius);
    color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: background 0.15s; margin-top: 10px; }
  .btn:hover { background: #388bfd; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg { border-radius: var(--radius); padding: 10px 14px; font-size: 13px; margin-top: 12px; display: none; }
  .msg.error { background: var(--red-dim); border: 1px solid rgba(248,81,73,0.2); color: var(--red); }
  .msg.success { background: var(--green-dim); border: 1px solid rgba(63,185,80,0.2); color: var(--green); }
  .login-link { text-align: center; color: var(--text2); font-size: 13px; margin-top: 18px; }
  .login-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .login-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏘️</div>
    <h1>ResiGuard</h1>
    <p>Create your account</p>
  </div>

  <div class="section-title">Basic Information</div>
  <div class="form-row">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your full name"/>
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="text" id="phone" placeholder="10-digit number"/>
    </div>
    <div class="form-group full">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters"/>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="role" onchange="showRoleFields()">
        <option value="">Select role…</option>
        <option value="RESIDENT">Resident</option>
        <option value="GUEST">Guest</option>
        <option value="MAID">Maid</option>
        <option value="SERVICE_PROVIDER">Service Provider</option>
        <option value="SECURITY_GUARD">Security Guard</option>
      </select>
    </div>
  </div>

  <!-- Resident fields -->
  <div id="residentFields" class="extra-fields">
    <div class="section-title">Residence Details</div>
    <div class="form-row">
      <div class="form-group">
        <label>Flat Number</label>
        <input type="text" id="flatNumber" placeholder="e.g. A-101"/>
      </div>
      <div class="form-group">
        <label>Building Name</label>
        <input type="text" id="buildingName" placeholder="e.g. Sunrise Apts"/>
      </div>
    </div>
  </div>

  <!-- Maid fields -->
  <div id="maidFields" class="extra-fields">
    <div class="section-title">Maid Details</div>
    <div class="form-row">
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="address" placeholder="Your address"/>
      </div>
      <div class="form-group">
        <label>ID Proof Number</label>
        <input type="text" id="idProofNumber" placeholder="Aadhaar / PAN etc."/>
      </div>
    </div>
  </div>

  <!-- Service Provider fields -->
  <div id="providerFields" class="extra-fields">
    <div class="section-title">Service Details</div>
    <div class="form-row">
      <div class="form-group">
        <label>Business Name</label>
        <input type="text" id="businessName" placeholder="Your business name"/>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="category">
          <option value="PLUMBER">Plumber</option>
          <option value="ELECTRICIAN">Electrician</option>
          <option value="CARPENTER">Carpenter</option>
          <option value="CLEANER">Cleaner</option>
          <option value="PAINTER">Painter</option>
          <option value="OTHER">Other</option>
        </select>
      </div>
      <div class="form-group full">
        <label>License Number</label>
        <input type="text" id="licenseNumber" placeholder="License / Registration No."/>
      </div>
    </div>
  </div>

  <!-- Guard fields -->
  <div id="guardFields" class="extra-fields">
    <div class="section-title">Guard Details</div>
    <div class="form-row">
      <div class="form-group">
        <label>Badge Number</label>
        <input type="text" id="badgeNumber" placeholder="e.g. BADGE-001"/>
      </div>
      <div class="form-group">
        <label>Shift</label>
        <select id="shift">
          <option value="Day">Day</option>
          <option value="Night">Night</option>
        </select>
      </div>
    </div>
  </div>

  <button class="btn" id="regBtn" onclick="register()">Create Account</button>
  <div class="msg" id="errorMsg"></div>
  <div class="msg" id="successMsg"></div>
  <div class="login-link">Already have an account? <a href="/login">Sign in</a></div>
</div>

<script>
function showRoleFields() {
  const role = document.getElementById('role').value;
  ['residentFields','maidFields','providerFields','guardFields'].forEach(id => {
    document.getElementById(id).className = 'extra-fields';
  });
  const map = { RESIDENT:'residentFields', MAID:'maidFields', SERVICE_PROVIDER:'providerFields', SECURITY_GUARD:'guardFields' };
  if (map[role]) document.getElementById(map[role]).className = 'extra-fields visible';
}

async function register() {
  const btn = document.getElementById('regBtn');
  const err = document.getElementById('errorMsg');
  const suc = document.getElementById('successMsg');
  err.style.display = 'none'; suc.style.display = 'none';

  const role = document.getElementById('role').value;
  if (!role) { showMsg('errorMsg', 'error', 'Please select a role.'); return; }

  const body = {
    name: document.getElementById('name').value.trim(),
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value,
    phone: document.getElementById('phone').value.trim(),
    role
  };

  if (role === 'RESIDENT') {
    body.flatNumber = document.getElementById('flatNumber').value.trim();
    body.buildingName = document.getElementById('buildingName').value.trim();
  } else if (role === 'MAID') {
    body.address = document.getElementById('address').value.trim();
    body.idProofNumber = document.getElementById('idProofNumber').value.trim();
  } else if (role === 'SERVICE_PROVIDER') {
    body.businessName = document.getElementById('businessName').value.trim();
    body.category = document.getElementById('category').value;
    body.licenseNumber = document.getElementById('licenseNumber').value.trim();
  } else if (role === 'SECURITY_GUARD') {
    body.badgeNumber = document.getElementById('badgeNumber').value.trim();
    body.shift = document.getElementById('shift').value;
  }

  btn.disabled = true; btn.textContent = 'Creating account…';

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success) {
      if (role === 'MAID' || role === 'SERVICE_PROVIDER') {
        showMsg('successMsg', 'success', 'Account created! Your profile is pending admin approval. You can login once approved.');
      } else {
        localStorage.setItem('token', data.data.token);
        localStorage.setItem('userId', data.data.userId);
        localStorage.setItem('userName', data.data.name);
        localStorage.setItem('userRole', data.data.role);
        window.location.href = '/dashboard';
      }
    } else { showMsg('errorMsg', 'error', data.message || 'Registration failed.'); }
  } catch (e) { showMsg('errorMsg', 'error', 'Cannot connect to server.'); }
  finally { btn.disabled = false; btn.textContent = 'Create Account'; }
}

function showMsg(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'msg ' + type; el.textContent = msg; el.style.display = 'block';
}
</script>
</body>
</html>
