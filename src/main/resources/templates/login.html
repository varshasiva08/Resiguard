<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ResiGuard — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg:#0d1117; --surface:#161b22; --surface2:#1c2330;
    --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.11);
    --text:#e6edf3; --text2:#8b949e; --text3:#484f58;
    --accent:#58a6ff; --green:#3fb950; --red:#f85149;
    --green-dim:rgba(63,185,80,0.12); --red-dim:rgba(248,81,73,0.12);
    --accent-dim:rgba(88,166,255,0.1); --radius:10px;
  }
  html, body { height: 100%; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
    display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px;
    padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo-icon { width: 56px; height: 56px; background: linear-gradient(135deg, #1f6feb, #388bfd);
    border-radius: 14px; display: inline-flex; align-items: center; justify-content: center;
    font-size: 26px; margin-bottom: 12px; }
  .logo h1 { color: var(--text); font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
  .logo p { color: var(--text2); font-size: 13px; margin-top: 4px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  .form-group input { width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 11px 14px; color: var(--text); font-size: 14px;
    font-family: inherit; outline: none; transition: border-color 0.15s; }
  .form-group input:focus { border-color: var(--accent); background: rgba(88,166,255,0.04); }
  .form-group input::placeholder { color: var(--text3); }
  .btn { width: 100%; padding: 12px; background: #1f6feb; border: none; border-radius: var(--radius);
    color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: background 0.15s; margin-top: 6px; }
  .btn:hover { background: #388bfd; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .error { background: var(--red-dim); border: 1px solid rgba(248,81,73,0.2); border-radius: var(--radius);
    padding: 10px 14px; color: var(--red); font-size: 13px; margin-top: 14px; display: none; }
  .divider { text-align: center; color: var(--text3); font-size: 12px; margin: 22px 0 16px; position: relative; }
  .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--border); }
  .divider::before { left: 0; } .divider::after { right: 0; }
  .register-link { text-align: center; color: var(--text2); font-size: 13px; }
  .register-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .register-link a:hover { text-decoration: underline; }
  .demo-section { margin-top: 24px; border-top: 1px solid var(--border); padding-top: 20px; }
  .demo-title { color: var(--text3); font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.2px; margin-bottom: 10px; }
  .demo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .demo-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; color: var(--text2); font-size: 11px; cursor: pointer; text-align: left;
    font-family: inherit; transition: all 0.12s; }
  .demo-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .demo-btn .demo-email { display: block; color: var(--text3); font-size: 10px; margin-top: 2px; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏘️</div>
    <h1>ResiGuard</h1>
    <p>Smart Community Management</p>
  </div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com" autofocus/>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()"/>
  </div>
  <button class="btn" id="loginBtn" onclick="login()">Sign In</button>
  <div class="error" id="errorMsg"></div>
  <div class="demo-section">
    <div class="demo-title">Quick Login — Demo Accounts</div>
    <div class="demo-grid">
      <button class="demo-btn" onclick="fill('admin@resiguard.com','admin123')">👤 Admin<span class="demo-email">admin@resiguard.com</span></button>
      <button class="demo-btn" onclick="fill('rahul@resiguard.com','password123')">🏠 Resident<span class="demo-email">rahul@resiguard.com</span></button>
      <button class="demo-btn" onclick="fill('priya@example.com','password123')">🚶 Guest<span class="demo-email">priya@example.com</span></button>
      <button class="demo-btn" onclick="fill('sunita@resiguard.com','password123')">🧹 Maid<span class="demo-email">sunita@resiguard.com</span></button>
      <button class="demo-btn" onclick="fill('ramesh@resiguard.com','password123')">🔧 Provider<span class="demo-email">ramesh@resiguard.com</span></button>
      <button class="demo-btn" onclick="fill('vijay@resiguard.com','password123')">💂 Guard<span class="demo-email">vijay@resiguard.com</span></button>
    </div>
  </div>
  <div class="divider">or</div>
  <div class="register-link">New user? <a href="/register">Create an account</a></div>
</div>
<script>
function fill(email, password) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = password;
}
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  if (!email || !password) { showError('Please enter your email and password.'); return; }
  btn.disabled = true; btn.textContent = 'Signing in…'; err.style.display = 'none';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('token', data.data.token);
      localStorage.setItem('userId', data.data.userId);
      localStorage.setItem('userName', data.data.name);
      localStorage.setItem('userRole', data.data.role);
      window.location.href = '/dashboard';
    } else { showError(data.message || 'Login failed. Please try again.'); }
  } catch (e) { showError('Cannot connect to server. Make sure the app is running.'); }
  finally { btn.disabled = false; btn.textContent = 'Sign In'; }
}
function showError(msg) {
  const err = document.getElementById('errorMsg');
  err.textContent = msg; err.style.display = 'block';
}
</script>
</body>
</html>
