spring.application.name=resiguard
server.port=8080

# ─── MySQL ────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/resiguard?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=@Jahnavi21

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── Thymeleaf (serves HTML pages) ───────────────────────────────────────────
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=resiguard-jwt-secret-key-must-be-at-least-32-chars!!
jwt.expiration=86400000
