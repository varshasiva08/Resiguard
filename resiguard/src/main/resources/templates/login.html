<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ResiGuard — Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 48px 40px;
    width: 420px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 12px;
  }

  .logo h1 {
    color: #fff;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo p {
    color: #94a3b8;
    font-size: 13px;
    margin-top: 4px;
  }

  .form-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    color: #cbd5e1;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 12px 16px;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: #3b82f6; background: rgba(59,130,246,0.08); }
  input::placeholder { color: #475569; }

  .btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .error {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    color: #fca5a5;
    font-size: 13px;
    margin-top: 14px;
    display: none;
  }

  .divider {
    text-align: center;
    color: #475569;
    font-size: 12px;
    margin: 20px 0 16px;
    position: relative;
  }

  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }

  .divider::before { left: 0; }
  .divider::after { right: 0; }

  .register-link {
    text-align: center;
    color: #64748b;
    font-size: 13px;
  }

  .register-link a {
    color: #3b82f6;
    text-decoration: none;
    font-weight: 500;
  }

  .register-link a:hover { text-decoration: underline; }

  .demo-accounts {
    margin-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.07);
    padding-top: 20px;
  }

  .demo-title {
    color: #64748b;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .demo-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .demo-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 7px 10px;
    color: #94a3b8;
    font-size: 11px;
    cursor: pointer;
    text-align: left;
    transition: background 0.2s;
  }

  .demo-btn:hover { background: rgba(59,130,246,0.15); color: #93c5fd; }
  .demo-btn span { display: block; color: #64748b; font-size: 10px; margin-top: 1px; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🏘️</div>
    <h1>ResiGuard</h1>
    <p>Smart Community Management</p>
  </div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com"/>
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••"
           onkeydown="if(event.key==='Enter') login()"/>
  </div>

  <button class="btn" id="loginBtn" onclick="login()">Sign In</button>

  <div class="error" id="errorMsg"></div>

  <div class="demo-accounts">
    <div class="demo-title">Quick Login — Demo Accounts</div>
    <div class="demo-grid">
      <button class="demo-btn" onclick="fill('admin@resiguard.com','admin123')">
        👤 Admin
        <span>admin@resiguard.com</span>
      </button>
      <button class="demo-btn" onclick="fill('rahul@resiguard.com','password123')">
        🏠 Resident
        <span>rahul@resiguard.com</span>
      </button>
      <button class="demo-btn" onclick="fill('priya@example.com','password123')">
        🚶 Guest
        <span>priya@example.com</span>
      </button>
      <button class="demo-btn" onclick="fill('sunita@resiguard.com','password123')">
        🧹 Maid
        <span>sunita@resiguard.com</span>
      </button>
      <button class="demo-btn" onclick="fill('ramesh@resiguard.com','password123')">
        🔧 Provider
        <span>ramesh@resiguard.com</span>
      </button>
      <button class="demo-btn" onclick="fill('vijay@resiguard.com','password123')">
        💂 Guard
        <span>vijay@resiguard.com</span>
      </button>
    </div>
  </div>

  <div class="divider">or</div>
  <div class="register-link">
    New user? <a href="/register">Create an account</a>
  </div>
</div>

<script>
function fill(email, password) {
  document.getElementById('email').value = email;
  document.getElementById('password').value = password;
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');

  if (!email || !password) {
    showError('Please enter your email and password.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  err.style.display = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem('token', data.data.token);
      localStorage.setItem('userId', data.data.userId);
      localStorage.setItem('userName', data.data.name);
      localStorage.setItem('userRole', data.data.role);
      window.location.href = '/dashboard';
    } else {
      showError(data.message || 'Login failed. Please try again.');
    }
  } catch (e) {
    showError('Cannot connect to server. Make sure the app is running.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function showError(msg) {
  const err = document.getElementById('errorMsg');
  err.textContent = msg;
  err.style.display = 'block';
}
</script>
</body>
</html>
